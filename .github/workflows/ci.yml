name: CI Pipeline

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install client dependencies
        run: |
          cd Client
          npm install

      - name: Build client
        run: |
          cd Client
          npm run build

      - name: Install server dependencies
        run: |
          cd Server
          npm install